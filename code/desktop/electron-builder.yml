# Nova 桌面端打包配置（electron-builder）
appId: com.nova.desktop
productName: Nova
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
npmRebuild: false

# 内置 Hermes（待 code/hermes/ 落地后启用）—— 见 TODO.md
# 当前策略：安装后优先检测并复用本机 Hermes（src/main/hermes.ts）
# extraResources:
#   - from: ../hermes/dist
#     to: hermes

# OTA 更新源（GitHub Releases）
publish:
  provider: github
  owner: MrRobot2658
  repo: Nova

mac:
  target:
    - target: dmg
      arch: arm64
    - target: zip # Squirrel.Mac 自动更新需要 zip + latest-mac.yml
      arch: arm64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # 本地未签名：用 `npm run dist:unsigned`（CSC_IDENTITY_AUTO_DISCOVERY=false）
  # 签名+公证：配好证书与 APPLE_* 环境变量后用 `npm run dist:signed`（见 DISTRIBUTION.md）

dmg:
  title: Nova ${version}

win:
  target:
    - target: nsis
      arch: x64
